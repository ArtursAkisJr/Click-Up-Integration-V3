name: Yearly Latvia Holidays Sync

on:
  schedule:
    # Run at 01:00 UTC on January 1st every year
    - cron: '0 1 1 1 *'
  workflow_dispatch:

jobs:
  yearly-latvia-holidays:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
      SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync Latvia public holidays for current year
        run: python sync_scripts/sync_latvia_holidays.py


